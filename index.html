<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jonah Barkley-Griggs</title>
    <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet" />
    <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f6f2;
      --surface: #ffffff;
      --border: #e0ddd6;
      --text: #1a1917;
      --muted: #6b6862;
      --accent: #2d5a8e;
      --accent-bg: #eef3f9;
      --mono: 'IBM Plex Mono', monospace;
      --sans: 'IBM Plex Sans', sans-serif;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #141412;
        --surface: #1e1d1b;
        --border: #2e2d2a;
        --text: #e8e5de;
        --muted: #8a8680;
        --accent: #6da4d4;
        --accent-bg: #1a2535;
      }
    }

    html { font-size: 16px; }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url('bg.jpg');
      background-size: cover;
      background-position: center;
      filter: blur(4px);
      scale: 1.1; /* prevents blur edges showing */
      z-index: -1;
    }

    .page {
      max-width: 720px;
      margin: 0 auto;
    }

    /* ── header ── */
    header {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      margin-bottom: 2.5rem;
      padding-bottom: 2rem;
      border-bottom: 1px solid var(--border);
    }

    .name {
      font-family: var(--mono);
      font-size: clamp(1.5rem, 4vw, 2.25rem);
      font-weight: 500;
      letter-spacing: -0.01em;
      color: var(--text);
    }

    .tagline {
      font-size: 0.95rem;
      color: var(--muted);
      max-width: 480px;
      line-height: 1.6;
    }

    /* ── link bar ── */
    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .link-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.35rem 0.75rem;
      border: 1px solid var(--border);
      border-radius: 999px;
      font-family: var(--mono);
      font-size: 0.8rem;
      color: var(--muted);
      text-decoration: none;
      background: var(--surface);
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }

    .link-pill:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-bg);
    }

    .link-pill svg {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* ── nav tabs ── */
    nav {
      display: flex;
      gap: 0;
      margin-bottom: 2rem;
      border-bottom: 1px solid var(--border);
    }

    .tab {
      font-family: var(--mono);
      font-size: 0.85rem;
      padding: 0.6rem 1.1rem;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color 0.15s, border-color 0.15s;
      user-select: none;
    }

    .tab:hover { color: var(--text); }

    .tab.active {
      color: var(--text);
      border-bottom-color: var(--accent);
    }

    /* ── content area ── */
    #content {
      min-height: 200px;
    }

    #content.htmx-request {
      opacity: 0.5;
      transition: opacity 0.2s;
    }

    /* ── partials share these styles ── */
    .prose { line-height: 1.75; color: var(--text); }
    .prose p { margin-bottom: 1rem; }
    .prose p:last-child { margin-bottom: 0; }
    .prose a { color: var(--accent); text-decoration: underline; text-underline-offset: 3px; }
    .prose h2 {
      font-family: var(--mono);
      font-size: 1rem;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 1rem;
      text-transform: lowercase;
    }

    .item-list { list-style: none; display: flex; flex-direction: column; gap: 1rem; }
    .item {
      padding: 1rem 1.25rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      transition: border-color 0.15s;
    }
    .item:hover { border-color: var(--accent); }
    .item-title { font-weight: 500; margin-bottom: 0.25rem; }
    .item-meta { font-family: var(--mono); font-size: 0.78rem; color: var(--muted); }

    /* ── footer ── */
    footer {
      margin-top: 4rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--muted);
    }
    </style>
  </head>
  <body>
    <div class="page">

      <header>
        <h1 class="name">Jonah Barkley-Griggs</h1>
        <p class="tagline">Freelance R&amp;D &ensp;|&ensp;Design, Develop, Deploy </p>

        <!-- ── link bar: add / remove pills as needed ── -->
        <div class="links">

          <a class="link-pill" href="https://orcid.org/0009-0007-9132-3954" target="_blank" rel="noopener">
            <!-- ORCID icon -->
            <img src="orcid.svg" alt="" aria-hidden="true" width="14" height="14" />
            Orcid
          </a>

          <a class="link-pill" href="https://github.com/Jsbarkleygriggs" target="_blank" rel="noopener">
            <!-- Github / git icon -->
            <img src="Github.svg" alt="" aria-hidden="true" width="14" height="14" />
            Github
          </a>

          <a class="link-pill" href="https://codeberg.org/J_S_Barkely-Griggs" target="_blank" rel="noopener">
            <!-- Codeberg / git icon -->
            <img src="Codeberg.svg" alt="" aria-hidden="true" width="14" height="14" />
            Codeberg
          </a>

          <a class="link-pill" href="https://osf.io/user/9reum" target="_blank" rel="noopener">
            <!-- OSF / git icon -->
            <img src="OSF.svg" alt="" aria-hidden="true" width="14" height="14" />
            OSF
          </a>

          <a class="link-pill" href="mailto:jbarkleygriggs@gmail.com">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <rect x="3" y="5" width="18" height="14" rx="2"/>
              <path d="M3 7l9 6 9-6"/>
            </svg>
            Email
          </a>

          <!-- add more pills here, e.g. Mastodon, personal blog, CV PDF -->

        </div>
      </header>

      <!-- ── tab nav: each button swaps #content via HTMX ── -->
      <nav id="tabs">
        <div class="tab active"
          hx-get="partials/about.html"
          hx-target="#content"
          hx-swap="innerHTML"
          hx-on:click="setActive(this)">
          about
        </div>
        <div class="tab"
          hx-get="partials/research.html"
          hx-target="#content"
          hx-swap="innerHTML"
          hx-on:click="setActive(this)">
          research
        </div>
        <div class="tab"
          hx-get="partials/fieldwork.html"
          hx-target="#content"
          hx-swap="innerHTML"
          hx-on:click="setActive(this)">
          field work
        </div>
        <div class="tab"
          hx-get="partials/projects.html"
          hx-target="#content"
          hx-swap="innerHTML"
          hx-on:click="setActive(this)">
          projects
        </div>
        <div class="tab"
          hx-get="partials/photography.html"
          hx-target="#content"
          hx-swap="innerHTML"
          hx-on:click="setActive(this)">
          photography
        </div>
      </nav>

      <!-- ── initial content loads inline; HTMX swaps it on tab click ── -->
      <main id="content">
        <div hx-get="partials/about.html" hx-trigger="load">
          loading...
        </div>
      </main>

      <footer>
        built with <a href="https://htmx.org" style="color:inherit">htmx</a> &amp;
        hosted on <a href="https://pages.github.com" style="color:inherit">github pages</a>
      </footer>

    </div>

    <script>
    function setActive(el) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    }
    </script>
  </body>
</html>
